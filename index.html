<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <title>ThoughtSpark - Voice Notes</title>
    <meta name="description" content="Voice notes, organized. Capture thoughts with AI." />
    <meta name="author" content="ThoughtSpark" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ThoughtSpark" />
    <link rel="apple-touch-icon" href="./app-icon-1024.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="ThoughtSpark - Voice Notes" />
    <meta property="og:description" content="Voice notes, organized. Capture thoughts with AI." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://thoughtspark.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ThoughtSpark" />
    <meta name="twitter:image" content="https://thoughtspark.app/og-image.png" />

    <script>
      // Avoid registering a service worker inside Capacitor (WKWebView).
      // SW caching can cause stale JS bundles and "stuck on launch" behavior in native builds.
      (function () {
        try {
          var isCapacitor =
            typeof window !== "undefined" &&
            (window.location.protocol === "capacitor:" ||
              window.location.protocol === "ionic:" ||
              window.location.href.indexOf("capacitor://") === 0);
          if (isCapacitor) return;
          if (!("serviceWorker" in navigator)) return;

          var s = document.createElement("script");
          s.src = "./registerSW.js";
          s.defer = true;
          document.head.appendChild(s);
        } catch (e) {
          // If anything goes wrong, fail open (no SW) rather than breaking app launch.
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
